<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WajikStream | Anime Aesthetic</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-white">

    <nav class="glass p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter text-indigo-400 cursor-pointer" onclick="location.reload()">WAJIK<span class="text-white">STREAM</span></h1>
            <input type="text" id="searchInput" placeholder="Cari anime..." class="bg-white/5 px-5 py-2 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 w-1/2 border border-white/10">
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6" id="mainContent">
        <div id="content">
            <div id="historyBar" class="mb-6 hidden">
                <p class="text-xs text-gray-500">Terakhir nonton: <span id="lastWatch" class="text-indigo-400 font-bold"></span></p>
            </div>
            <h2 class="text-2xl font-bold mb-6 text-indigo-300" id="title">Anime Terbaru</h2>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
