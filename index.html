<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WajikStream | Anime Aesthetic</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid #1f2937; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .anime-card:hover img { transform: scale(1.05); transition: 0.4s; }
    </style>
</head>
<body class="text-white">

    <nav class="glass p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter text-indigo-400 cursor-pointer" onclick="location.reload()">WAJIK<span class="text-white">STREAM</span></h1>
            <input type="text" id="searchInput" placeholder="Cari anime..." class="bg-white/5 px-5 py-2 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 w-1/2 border border-white/10">
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6" id="mainContent">
        <div id="content">
            <div id="historyBar" class="mb-6 hidden">
                <p class="text-xs text-gray-500">Terakhir nonton: <span id="lastWatch" class="text-indigo-400 font-bold"></span></p>
            </div>
            <h2 class="text-2xl font-bold mb-6 text-indigo-300" id="title">Anime Terbaru</h2>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>
    </main>

    <script>
        const API = "https://wajik-anime-api-eight.vercel.app/api";
        const PROXY = "https://corsproxy.io/?"; 
        
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        async function fetchData(url) {
            const res = await fetch(PROXY + encodeURIComponent(url));
            return await res.json();
        }

        async function fetchRecent() {
            const last = localStorage.getItem('last_watch_title');
            if(last) {
                document.getElementById('historyBar').classList.remove('hidden');
                document.getElementById('lastWatch').innerText = last;
            }
            grid.innerHTML = '<div class="loader mx-auto mt-20"></div>';
            const data = await fetchData(`${API}/recent`);
            renderGrid(data.recent);
        }

        function renderGrid(list) {
            grid.innerHTML = list.map(a => `
                <div class="anime-card group cursor-pointer overflow-hidden rounded-2xl" onclick="fetchDetail('${a.endpoint}')">
                    <div class="relative overflow-hidden rounded-2xl">
                        <img src="${a.thumb}" class="w-full aspect-[2/3] object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        <p class="absolute bottom-3 left-3 text-sm font-bold truncate pr-2">${a.title}</p>
                    </div>
                </div>
            `).join('');
        }

        async function fetchDetail(endpoint) {
            grid.innerHTML = '<div class="loader mx-auto mt-20"></div>';
            const data = await fetchData(`${API}/detail/${endpoint}`);
            
            localStorage.setItem('last_watch_title', data.title);
            
            const episodeButtons = data.episode_list?.map(eps => `
                <button onclick="playEps('${eps.stream_url}')" class="glass hover:bg-indigo-600 px-4 py-2 rounded-lg text-xs font-bold transition">
                    ${eps.title}
                </button>
            `).join('') || '<p>No episodes.</p>';

            const serverButtons = data.servers?.map(srv => `
                <button onclick="playEps('${srv.url}')" class="glass hover:bg-emerald-600 px-4 py-2 rounded-lg text-xs font-bold transition border border-emerald-500/30">
                    Server ${srv.name}
                </button>
            `).join('') || '';

            document.getElementById('content').innerHTML = `
                <button onclick="location.reload()" class="mb-6 text-indigo-400 hover:text-white transition">← Kembali</button>
                <h1 class="text-4xl font-bold mb-6">${data.title}</h1>
                <div class="aspect-video w-full max-w-4xl mx-auto glass rounded-2xl p-2 shadow-2xl">
                    <iframe id="mainPlayer" src="${data.stream_url}" class="w-full h-full rounded-xl" allowfullscreen></iframe>
                </div>
                <div class="mt-4"><button onclick="document.getElementById('mainPlayer').src+='&t=85s'" class="glass px-4 py-2 rounded-lg text-xs text-yellow-500">Skip Intro 85s</button></div>
                
                <div class="mt-8 flex flex-col gap-6">
                    <div><h3 class="text-lg font-bold mb-3 text-emerald-400">Server:</h3><div class="flex flex-wrap gap-2">${serverButtons}</div></div>
                    <div><h3 class="text-lg font-bold mb-3 text-indigo-300">Episode:</h3><div class="flex flex-wrap gap-2">${episodeButtons}</div></div>
                </div>
                <div class="mt-8 p-6 glass rounded-2xl"><h3 class="font-bold text-indigo-400">Sinopsis</h3><p class="text-gray-400 mt-2">${data.synopsis || 'Tidak ada deskripsi.'}</p></div>
            `;
        }

        function playEps(url) {
            document.getElementById('mainPlayer').src = url;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        fetchRecent();
    </script>
</body>
</html>
